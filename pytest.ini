[pytest]
testpaths = .claude/scripts/data_modules/tests
pythonpath = .claude/scripts
# Notes:
# - Avoid relative paths in the CLI to prevent false coverage=0 reports when running from different working directories.
# - Coverage scope is controlled by the [run] source setting in .coveragerc.
addopts = -q --cov --cov-report=term-missing --cov-fail-under=90
